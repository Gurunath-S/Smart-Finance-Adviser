<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a4e"/>
      <stop offset="100%" style="stop-color:#3b3b9e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>

  <!-- Rupee symbol ₹ -->
  <!-- Top horizontal bar -->
  <rect x="28" y="24" width="44" height="7" rx="3.5" fill="url(#gold)"/>
  <!-- Second horizontal bar -->
  <rect x="28" y="37" width="30" height="7" rx="3.5" fill="url(#gold)"/>
  <!-- Vertical stem -->
  <rect x="28" y="24" width="8" height="52" rx="4" fill="url(#gold)"/>
  <!-- Diagonal slash line -->
  <line x1="36" y1="44" x2="66" y2="76" stroke="url(#gold)" stroke-width="7.5" stroke-linecap="round"/>

  <!-- Small upward trend arrow in bottom-right -->
  <polyline points="62,72 72,58 80,65" stroke="#4ade80" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polygon points="80,65 78,55 70,60" fill="#4ade80"/>
</svg>
